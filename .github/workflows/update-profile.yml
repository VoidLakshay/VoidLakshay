name: Update Profile SVGs

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Generate ASCII Art
        run: node scripts/ascii-generator.js

      - name: Fetch GitHub Stats
        run: node scripts/update-stats.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SVGs
        run: node scripts/generate-svg.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/dark.svg assets/light.svg assets/ascii.txt stats.json
          git commit -m "chore: auto-update profile SVGs and stats" || echo "No changes to commit"
          git push
